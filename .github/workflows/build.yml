name: Build and Release ESP32-C3 Firmware

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Move File for Build
        run: |
          mkdir -p src
          cp *.ino src/main.cpp || cp *.cpp src/main.cpp

      - name: Run PlatformIO Build
        run: pio run

      - name: Delete old Release
        run: |
          gh release delete latest --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new Release with firmware
        run: |
          gh release create latest \
            .pio/build/esp32-c3-devkitm-1/firmware.bin \
            --title "Latest Firmware" \
            --notes "Auto build from main branch" \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
