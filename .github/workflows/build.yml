name: Build ESP32-C3 Firmware

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # ভার্সন আপডেট করা হয়েছে

      - name: Set up Python
        uses: actions/setup-python@v5 # ভার্সন আপডেট করা হয়েছে
        with:
          python-version: '3.9'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Run PlatformIO Build
        run: pio run

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # এটিই মূল সমস্যা ছিল, এখন ঠিক করা হয়েছে
        with:
          name: firmware
          path: .pio/build/esp32-c3-devkitm-1/firmware.bin
